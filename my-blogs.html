<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blogs – Preview Snippet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --green-100: #eef5ee;
      --green-200: #d4ebcf;
      --green-300: #a8d5a0;
      --green-500: #3a8c3f;
      --green-600: #2d7032;
      --green-700: #1f5224;
      --text-primary: #1a1f1a;
      --text-secondary: #4a5549;
      --text-muted: #7a8a79;
      --border: #d8e4d6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       MY BLOGS SECTION — embed this block
       ══════════════════════════════════════ */
    .blogs-section {
      border-top: 1px solid var(--border);
      padding: 56px 0 64px;
      background: var(--bg);
    }
    .blogs-section-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px;
    }
    .blogs-section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
    }
    .blogs-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--green-500);
      margin-bottom: 6px;
    }
    .blogs-section-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.015em;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .blogs-section-all {
      font-size: 13px;
      font-weight: 600;
      color: var(--green-500);
      text-decoration: none;
      white-space: nowrap;
      transition: color .2s;
      flex-shrink: 0;
    }
    .blogs-section-all:hover { color: var(--green-700); }
    .blogs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .blog-preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .blog-preview-card:hover {
      border-color: var(--green-300);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(58,140,63,.08);
    }
    .blog-preview-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--green-500);
      margin-bottom: 8px;
    }
    .blog-preview-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 8px;
      flex: 1;
    }
    .blog-preview-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .blog-preview-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .blog-preview-arrow {
      font-size: 14px;
      color: var(--green-500);
      font-weight: 700;
    }
  </style>
</head>
<body>

<!--
  ══════════════════════════════════════════════════════════════
  HOW TO EMBED IN ANY HTML PAGE
  1. Copy the CSS above into that page's <style> block.
  2. Paste the <section class="blogs-section">…</section> below
     just ABOVE the <footer> tag on every page.
  ══════════════════════════════════════════════════════════════
-->

<section class="blogs-section">
  <div class="blogs-section-inner">

    <div class="blogs-section-header">
      <div>
        <div class="blogs-section-label">From the blog</div>
        <div class="blogs-section-title">Bài viết mới nhất</div>
      </div>
      <a href="my-blogs.html" class="blogs-section-all">Xem tất cả →</a>
    </div>

    <div class="blogs-grid">

      <a href="startup-growth-framework.html" class="blog-preview-card">
        <div class="blog-preview-tag">PMF · Data · PLG</div>
        <div class="blog-preview-title">Framework 3 Bước Giúp Startup Tăng Trưởng Bền Vững</div>
        <div class="blog-preview-footer">
          <span class="blog-preview-meta">8 phút · T5/2025</span>
          <span class="blog-preview-arrow">→</span>
        </div>
      </a>

      <a href="#" class="blog-preview-card">
        <div class="blog-preview-tag">Data</div>
        <div class="blog-preview-title">North Star Metric: Cách chọn chỉ số đúng cho từng giai đoạn</div>
        <div class="blog-preview-footer">
          <span class="blog-preview-meta">6 phút · T4/2025</span>
          <span class="blog-preview-arrow">→</span>
        </div>
      </a>

      <a href="#" class="blog-preview-card">
        <div class="blog-preview-tag">PMF</div>
        <div class="blog-preview-title">5 Dấu hiệu cho thấy bạn chưa đạt Product-Market Fit</div>
        <div class="blog-preview-footer">
          <span class="blog-preview-meta">5 phút · T3/2025</span>
          <span class="blog-preview-arrow">→</span>
        </div>
      </a>

    </div>
  </div>
</section>

</body>
</html>
