<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blogs – Entity Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --green-100: #eef5ee;
      --green-200: #d4ebcf;
      --green-300: #a8d5a0;
      --green-500: #3a8c3f;
      --green-600: #2d7032;
      --green-700: #1f5224;
      --text-primary: #1a1f1a;
      --text-secondary: #4a5549;
      --text-muted: #7a8a79;
      --border: #d8e4d6;
      --h1: 48px;
      --h2: 36px;
      --body: 16px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: var(--body);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

  
    /* ── HERO ── */
    .hero {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 32px 48px;
      animation: fadeUp .6s ease both;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-100);
      color: var(--green-600);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green-500);
      border-radius: 50%;
    }
    h1 {
      font-size: var(--h1);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.02em;
      color: var(--text-primary);
      padding-bottom: 15px;
    }
    .hero-sub {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 620px;
      margin-top: 8px;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .hero-meta-item { font-size: 13px; color: var(--text-muted); }
    .hero-meta-item strong { color: var(--text-secondary); }
    .dot { color: var(--border); }

    /* ── CONTENT ── */
    .content {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px 100px;
    }

    /* ── STATE BLOCKS ── */
    .state-block {
      background: var(--green-100);
      border: 1px solid var(--green-200);
      border-radius: 10px;
      padding: 32px 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .state-block .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--green-200);
      border-top-color: var(--green-500);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    .state-block .state-title {
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .error-block {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-left: 4px solid #ef4444;
      border-radius: 10px;
      padding: 20px 24px;
      font-size: 14px;
      color: #7f1d1d;
      margin-bottom: 32px;
    }
    .error-block strong { display: block; margin-bottom: 4px; }

    /* ── BLOG GRID ── */
    .blog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      animation: fadeUp .4s ease both;
    }
    .blog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 26px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .blog-card:hover {
      border-color: var(--green-300);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(58,140,63,.08);
    }
    .blog-card-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--green-500);
      margin-bottom: 10px;
    }
    .blog-card h3 {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-primary);
      padding-bottom: 3px;
      flex: 1;
    }
    .blog-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .blog-card-meta { font-size: 12px; color: var(--text-muted); }
    .blog-card-arrow { font-size: 16px; color: var(--green-500); font-weight: 700; }

    /* post count badge */
    #post-count {
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">All Articles</div>
  <h1>My Blogs</h1>
  <p class="hero-sub">Tổng hợp các bài viết về Growth Marketing, Product Strategy và Data — được viết từ trải nghiệm thực chiến, không phải lý thuyết sách vở.</p>
    <span class="dot">·</span>
    <span class="hero-meta-item" id="post-count">Đang tải...</span>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="blog-state" class="state-block">
    <div class="spinner"></div>
    <div class="state-title">Đang tải bài viết...</div>
    <div>Đang kết nối GitHub</div>
  </div>
  <div id="blog-grid" class="blog-grid" style="display:none;"></div>
</div>

<script>
  // ─────────────────────────────────────────────────
  // CONFIGURE THESE TWO LINES:
  const GITHUB_USER = 'nguyentanthinh105-create';   // e.g. 'nguyentanthinh'
  const GITHUB_REPO = 'Marketing-Blog';       // e.g. 'entity-studio'
  // Folder inside the repo where your HTML articles live:
  const ARTICLES_FOLDER = 'new-article';
  // Base URL to open articles (use raw GitHub Pages URL or repo pages URL):
  // If hosted on GitHub Pages: `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${ARTICLES_FOLDER}/`
  // If linking to raw repo files:
  const BASE_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${ARTICLES_FOLDER}/`;
  // ─────────────────────────────────────────────────

  const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${ARTICLES_FOLDER}`;

  async function loadBlogs() {
    const stateEl = document.getElementById('blog-state');
    const gridEl  = document.getElementById('blog-grid');
    const countEl = document.getElementById('post-count');

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);

      const files = await res.json();

      // Keep only .html files
      const articles = files.filter(f => f.type === 'file' && f.name.endsWith('.html'));

      if (articles.length === 0) {
        stateEl.innerHTML = `
          <div class="state-title">Chưa có bài viết nào</div>
          <div>Thêm file .html vào thư mục <code>${ARTICLES_FOLDER}</code> trên GitHub.</div>`;
        return;
      }

      countEl.textContent = `${articles.length} bài viết`;
      stateEl.style.display = 'none';
      gridEl.style.display  = 'grid';

      articles.forEach(file => {
        // Derive a readable title from the filename
        // e.g. "startup-growth-framework.html" → "Startup Growth Framework"
        const raw   = file.name.replace('.html', '');
        const title = raw.replace(/[-_]/g, ' ')
                        .replace(/\b\w/g, c => c.toUpperCase());

        // Build the card
        const card = document.createElement('a');
        card.className = 'blog-card';
        card.href      = BASE_URL + file.name;
        card.target    = '_blank';
        card.rel       = 'noopener';

        // Try to extract last commit date from file sha (not available without extra call),
        // so we show the file name as a subtle meta label instead.
        card.innerHTML = `
          <div class="blog-card-tag">Article</div>
          <h3>${title}</h3>
          <div class="blog-card-footer">
            <span class="blog-card-meta">${file.name}</span>
            <span class="blog-card-arrow">→</span>
          </div>`;

        gridEl.appendChild(card);
      });

    } catch (err) {
      stateEl.outerHTML = `
        <div class="error-block">
          <strong>Không thể tải bài viết</strong>
          ${err.message}<br><br>
          Hãy kiểm tra lại <code>GITHUB_USER</code>, <code>GITHUB_REPO</code>
          và đảm bảo repo là public.
        </div>`;
      countEl.textContent = 'Lỗi tải';
    }
  }

  loadBlogs();
</script>

</body>
</html>
