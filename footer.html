<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footer – Entity Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --border: #d8e4d6;
      --text-primary: #1a1f1a;
      --text-secondary: #4a5549;
      --text-muted: #7a8a79;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 40px 0 32px;
    }

    .footer-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* Top card — mimics the banner in the image */
    .footer-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      gap: 24px;
      margin-bottom: 32px;
    }

    .footer-logo {
      flex-shrink: 0;
    }

    .footer-logo img {
      height: 80px;
      width: auto;
      display: block;
    }

    /* Fallback if gif not present */
    .footer-logo-placeholder {
      height: 100px;
      width: 100px;
      background: var(--text-primary);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .footer-info {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .footer-contact p {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.6;
      padding-bottom: 0;
    }

    .footer-contact a {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
    }

    .footer-contact a:hover {
      text-decoration: underline;
    }

    .footer-brand {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .footer-brand-name {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .footer-brand-title {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .footer-brand-tagline {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Bottom strip */
    .footer-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-bottom-left {
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-nav {
      display: flex;
      gap: 20px;
    }

    .footer-nav a {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }

    .footer-nav a:hover {
      color: var(--text-primary);
    }

    /* ── HOW TO EMBED ── */
    /* Add <link rel="stylesheet"> pointing to your shared CSS or just paste 
       this <footer> block at the bottom of each page before </body>. */
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     COPY EVERYTHING BELOW INTO EACH HTML PAGE
     (replace the closing </body> tag with this footer + </body>)
════════════════════════════════════════════ -->

<footer>
  <div class="footer-inner">

    <!-- Identity card — mirrors the banner design from the brief -->
    <div class="footer-card">

      <!-- Logo (GIF) -->
      <div class="footer-logo">
        <img src="logo.gif" alt="Entity Studio logo"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="footer-logo-placeholder" style="display:none;">ES</div>
      </div>

      <!-- Contact + Brand info aligned right, matching the banner layout -->
      <div class="footer-info">
        <div class="footer-contact">
          <p>Nguyễn Tấn Thịnh</p>
          <a href="mailto:nguyentanthinh105@gmail.com">nguyentanthinh105@gmail.com</a>
        </div>
        <div class="footer-brand">
          <span class="footer-brand-name">entity studio</span>
          <span class="footer-brand-title">Fullstack Growth Marketing</span>
          <span class="footer-brand-tagline">PMF → Strategy → Execution</span>
        </div>
      </div>

    </div>

    <!-- Bottom strip -->
    <div class="footer-bottom">
      <span class="footer-bottom-left">© 2025 Entity Studio · All rights reserved</span>
      <nav class="footer-nav">
        <a href="#">PMF</a>
        <a href="#">Data</a>
        <a href="#">PLG</a>
        <a href="#">Contact</a>
      </nav>
    </div>

  </div>
</footer>

</body>
</html>
